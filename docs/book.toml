[book]
title = "Fatou"
description = "Language server, formatter, and linter for Julia"
authors = ["Johan Larsson"]
language = "en"
src = "src"

[output.html]
site-url = "https://fatou.dev/"
git-repository-url = "https://github.com/jolars/fatou"
edit-url-template = "https://github.com/jolars/fatou/edit/main/docs/{path}"
default-theme = "light"
preferred-dark-theme = "navy"
# Vendored Vega runtime + the benchmark chart renderer (theme/bench-charts.js).
# Load order matters: vega, then vega-lite, then vega-embed, then our script.
additional-js = [
    "theme/vendor/vega.min.js",
    "theme/vendor/vega-lite.min.js",
    "theme/vendor/vega-embed.min.js",
    "theme/bench-charts.js",
]
additional-css = ["theme/bench-charts.css"]

[output.html.search]
enable = true

[preprocessor.doc-utils]
command = "cargo run --quiet --manifest-path doc-utils/Cargo.toml"
optional = true
