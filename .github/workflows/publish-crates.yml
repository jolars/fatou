name: Publish Crates

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release # Optional: for enhanced security
    permissions:
      id-token: write # Required for OIDC token exchange
    steps:
      - uses: actions/checkout@v7

      - uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -euo pipefail
          name=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].name')
          version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          # crates.io requires a descriptive User-Agent; 200 means the exact
          # version already exists, so skip instead of failing the run.
          status=$(curl -sS -o /dev/null -w '%{http_code}' \
            -A "fatou-release-ci (https://github.com/jolars/fatou)" \
            "https://crates.io/api/v1/crates/$name/$version")
          if [ "$status" = "200" ]; then
            echo "$name@$version already on crates.io — skipping."
            exit 0
          fi
          cargo publish --no-verify
