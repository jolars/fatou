name: Documentation

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so sitemap <lastmod> can come from git
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: latest
      - name: Build mdBook
        run: mdbook build docs
      - name: Inject canonical links
        run: cargo run --quiet --example canonical -- docs/book https://fatou.dev/
      - name: Generate sitemap
        run: cargo run --quiet --example sitemap -- docs/book https://fatou.dev/
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs/book
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
