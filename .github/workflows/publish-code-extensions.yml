name: Publish Code Extensions

on:
  workflow_call:
    inputs:
      release-tag:
        description: "GitHub release tag to download binaries from"
        type: string
        required: true
  workflow_dispatch:
    inputs:
      release-tag:
        description: "Release tag to download binaries from"
        type: string
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ inputs.release-tag }}
  cancel-in-progress: true

jobs:
  publish-platform:
    name: Publish ${{ matrix.vsce_target }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      # Publish targets one at a time: all targets share a single Open VSX
      # version record, so concurrent publishes of the same release race on the
      # server and lose with a 405. Serializing trades ~5 min for reliability.
      max-parallel: 1
      matrix:
        include:
          - vsce_target: win32-x64
            rust_target: x86_64-pc-windows-msvc
            binary: fatou.exe
          - vsce_target: win32-arm64
            rust_target: aarch64-pc-windows-msvc
            binary: fatou.exe
          - vsce_target: linux-x64
            rust_target: x86_64-unknown-linux-gnu
            binary: fatou
          - vsce_target: linux-arm64
            rust_target: aarch64-unknown-linux-gnu
            binary: fatou
          - vsce_target: alpine-x64
            rust_target: x86_64-unknown-linux-musl
            binary: fatou
          - vsce_target: alpine-arm64
            rust_target: aarch64-unknown-linux-musl
            binary: fatou
          - vsce_target: darwin-x64
            rust_target: x86_64-apple-darwin
            binary: fatou
          - vsce_target: darwin-arm64
            rust_target: aarch64-apple-darwin
            binary: fatou
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: editors/code/package-lock.json

      - name: Install dependencies
        working-directory: editors/code
        run: npm ci

      - name: Download binary (release asset)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p editors/code/server
          cd editors/code/server
          if [[ "${{ matrix.binary }}" == *.exe ]]; then
            gh release download "${{ inputs.release-tag }}" -p "fatou-${{ matrix.rust_target }}.zip" --repo "${{ github.repository }}"
            unzip -j "fatou-${{ matrix.rust_target }}.zip" "${{ matrix.binary }}"
            rm "fatou-${{ matrix.rust_target }}.zip"
          else
            gh release download "${{ inputs.release-tag }}" -p "fatou-${{ matrix.rust_target }}.tar.gz" --repo "${{ github.repository }}"
            tar -xzf "fatou-${{ matrix.rust_target }}.tar.gz" "./${{ matrix.binary }}"
            rm "fatou-${{ matrix.rust_target }}.tar.gz"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Mark binary executable
        run: chmod +x editors/code/server/${{ matrix.binary }}

      - name: Package VSIX
        working-directory: editors/code
        run: npx vsce package --target ${{ matrix.vsce_target }} -o fatou-${{ matrix.vsce_target }}.vsix

      - name: Publish to Open VSX Registry
        uses: HaaLeo/publish-vscode-extension@v2
        with:
          pat: ${{ secrets.OVSX_PAT }}
          extensionFile: editors/code/fatou-${{ matrix.vsce_target }}.vsix

      - name: Publish to Visual Studio Marketplace
        uses: HaaLeo/publish-vscode-extension@v2
        with:
          pat: ${{ secrets.VSCE_PAT }}
          registryUrl: https://marketplace.visualstudio.com
          extensionFile: editors/code/fatou-${{ matrix.vsce_target }}.vsix
