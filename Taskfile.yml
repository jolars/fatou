version: "3"

tasks:
  lint:
    desc: Run clippy with warnings as errors
    cmds:
      - cargo clippy --all-targets --all-features -- -D warnings

  format:
    desc: Format the code with rustfmt
    cmds:
      - cargo fmt --

  format-check:
    desc: Check rustfmt formatting
    cmds:
      - cargo fmt -- --check

  build-release:
    desc: Build the release binary
    cmds:
      - cargo build --release

  test:
    desc: Run the test suite
    cmds:
      - cargo test

  test-debug:
    desc: Run tests with debug logging
    cmds:
      - RUST_LOG=debug cargo test

  audit:
    desc: Run a security audit of dependencies
    cmds:
      - cargo audit

  deny:
    desc: Check licenses, advisories, and sources
    cmds:
      - cargo deny check

  logo:
    desc: 'Generate the logo (pass params after --, e.g. `task logo -- mode=newton`)'
    cmds:
      - julia -t auto scripts/generate-logo.jl {{.CLI_ARGS}}

  logo-watch:
    desc: 'Re-generate the logo whenever the script changes (`task logo-watch -- mode=newton`)'
    watch: true
    sources:
      - scripts/generate-logo.jl
    cmds:
      - julia -t auto scripts/generate-logo.jl {{.CLI_ARGS}}

  juliaformatter-report:
    desc: Triage formatter parity vs JuliaFormatter.jl (writes tests/oracle/juliaformatter-report.txt)
    cmds:
      - cargo test --test juliaformatter_oracle -- --ignored juliaformatter_full_report --nocapture

  update-juliaformatter-corpus:
    desc: Regenerate the pinned JuliaFormatter oracle corpus (needs devenv Julia)
    cmds:
      - bash scripts/update-juliaformatter-corpus.sh
