version: "3"

tasks:
  lint:
    desc: Run clippy with warnings as errors
    cmds:
      - cargo clippy --all-targets --all-features -- -D warnings

  format:
    desc: Format the code with rustfmt
    cmds:
      - cargo fmt --

  format-check:
    desc: Check rustfmt formatting
    cmds:
      - cargo fmt -- --check

  build-release:
    desc: Build the release binary
    cmds:
      - cargo build --release

  test:
    desc: Run the test suite
    cmds:
      - cargo test

  test-debug:
    desc: Run tests with debug logging
    cmds:
      - RUST_LOG=debug cargo test

  audit:
    desc: Run a security audit of dependencies
    cmds:
      - cargo audit

  deny:
    desc: Check licenses, advisories, and sources
    cmds:
      - cargo deny check

  docs-preview:
    desc: Serve the docs site locally with live reload
    cmds:
      - mdbook serve docs --open

  docs-build:
    desc: Build the docs site into docs/book with canonical links and sitemap
    cmds:
      - mdbook build docs
      - task: docs-canonical
      - task: docs-sitemap

  docs-canonical:
    desc: Inject <link rel="canonical"> into each rendered page
    cmds:
      - >-
        cargo run --quiet --example canonical --
        docs/book https://fatou.dev/

  docs-sitemap:
    desc: Generate docs/book/sitemap.xml from the rendered book
    cmds:
      - >-
        cargo run --quiet --example sitemap --
        docs/book https://fatou.dev/

  logo:
    desc: 'Generate the logo (pass params after --, e.g. `task logo -- mode=newton`)'
    cmds:
      - julia -t auto scripts/generate-logo.jl {{.CLI_ARGS}}

  logo-watch:
    desc: 'Re-generate the logo whenever the script changes (`task logo-watch -- mode=newton`)'
    watch: true
    sources:
      - scripts/generate-logo.jl
    cmds:
      - julia -t auto scripts/generate-logo.jl {{.CLI_ARGS}}
